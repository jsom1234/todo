<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 12px;
      background: #111; color: #eee;
      font-family: sans-serif;
    }
    h1 { font-size: 1.2rem; text-align: center; margin: 8px 0 16px; }
    .task {
      display: flex; align-items: center;
      gap: 12px; padding: 12px 14px; margin-bottom: 10px;
      border-radius: 12px; color: #1a1a1a; font-size: 1rem;
    }
    .task.todo { background: #e8e8e8; }            /* light grey */
    .task.done { background: #c9f0d4; }            /* light green */
    .task .label { flex: 1; }
    .task .order { opacity: 0.65; font-variant-numeric: tabular-nums; }
    .task button {
      border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; min-width: 76px; color: #1a1a1a;
    }
    .task.todo button { background: #f6d743; }     /* yellow */
    .task.done button { background: #5cc47a; }     /* darker green */
    .task button:disabled { cursor: default; }
    #status { text-align: center; opacity: 0.6; padding: 20px; }
  </style>
</head>
<body>
  <h1>Today's Tasks</h1>
  <div id="list"></div>
  <div id="status">Loading…</div>

  <script>
    const URL = 'https://script.google.com/macros/s/AKfycbzWe3kmPoaSP9JiU_QpGjTikD3EwLi-69a3MS5Go8DIV5sGjydHr9bmtYI7hXNsp9tn/exec';  // ends in /exec
    const list = document.getElementById('list');
    const status = document.getElementById('status');

    function fmtOrder(o) {
      const n = Number(o);
      if (isNaN(n)) return o;
      if (n >= 24) return String(o);   // weekly-block rows etc. show raw
      const hours = Math.floor(n);
      // decimal fraction of an hour-label -> minutes (.1=10, .45=45, .05=5)
      const frac = n - hours;
      const mins = Math.round(frac * 100);
      const pad = x => String(x).padStart(2, '0');
      return pad(hours) + ':' + pad(mins);
    }

    function render(tasks) {
      list.innerHTML = '';
      tasks.sort((a, b) => Number(a.order) - Number(b.order));
      for (const t of tasks) {
        const row = document.createElement('div');
        row.className = 'task ' + (t.done ? 'done' : 'todo');

        const order = document.createElement('span');
        order.className = 'order';
        order.textContent = fmtOrder(t.order);

        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = t.task;

        const btn = document.createElement('button');
        btn.textContent = t.done ? 'Done' : 'TODO';
        btn.disabled = t.done;
        btn.onclick = () => markDone(t, row, btn);

        row.append(order, label, btn);
        list.appendChild(row);
      }
    }

    function markDone(t, row, btn) {
      // update UI immediately
      t.done = true;
      row.className = 'task done';
      btn.textContent = 'Done';
      btn.disabled = true;

      // fire the sheet update in the background
      fetch(URL + '?action=done&row=' + t.row).catch(() => {
        // revert on failure
        t.done = false;
        row.className = 'task todo';
        btn.textContent = 'TODO';
        btn.disabled = false;
        alert('Failed to save — try again');
      });
    }

    async function load() {
      try {
        const r = await fetch(URL);
        const data = await r.json();
        render(data.tasks);
        status.textContent = data.tasks.length ? '' : 'No tasks for today';
      } catch (e) {
        status.textContent = 'Error loading tasks';
      }
    }

    load();
  </script>
</body>
</html>
